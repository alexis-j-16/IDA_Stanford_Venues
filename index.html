<!DOCTYPE html>
<html lang="en">
<head>
    <title>Display a popup on click</title>
    <meta property="og:description" content="When a user clicks a symbol, show a popup containing more information." />
    <meta property="og:created" content="2025-06-25" />
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css' />
    <script src='https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js'></script>
    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
    </style>
</head>
<body>
<style>
    .maplibregl-popup {
        max-width: 700px;
        font: 12px/20px 'Helvetica Neue', Arial, Helvetica, sans-serif;
    }
</style>
<div id="map"></div>
<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
        center: [-122.1701, 37.42806],
        zoom: 14.00
    });

    map.on('load', async () => {
        const image = await map.loadImage('https://maplibre.org/maplibre-gl-js/docs/assets/custom_marker.png');
        // Add an image to use as a custom marker
        map.addImage('custom-marker', image.data);
        
        map.addSource('places', {
            'type': 'geojson',
            'data': {
                'type': 'FeatureCollection',
                'features': [
                    {
                        'type': 'Feature',
                        'properties': {
                            'description':
                                '<strong>Annenberg Auditorium</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.kyt2x1c3wrul" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p><strong>Stanford Spatial History Note:</strong>This venue is no longer present on our campus.<p>During a <a href="https://youtu.be/Zjr_Q9RXQOs?si=0H5sgXp1un_XGCUg" target="_blank" title="Opens in a new window">demolition and construction process</a> process that spanned January 2016 to September 2017, Annenberg Auditorium and its host building, the Cummings Art Building, were taken down so that its site could be absorbed by the Hoover Institution and used for the David and Joan Traitel Building.<p>This development is connected to the history of Stanford’s striking McMurtry Building, which was built for the future of the Department of Art and Art History and the Art and Architecture Library as the Cummings Art Building was demolished (<a href="https://stanforddaily.com/2012/09/18/hoover-to-build-45-55m-facility/" target="_blank" title="Opens in a new window">Stanford Daily</a>). The <a href="https://art.stanford.edu/about/academic-facilities/mcmurtry-building" target="_blank" title="Opens in a new window">McMurtry space</a> debuted for the Fall Quarter of 2015, and stands today as a venue for IDA programming, including for the 2026 William & Louise Greaves Filmmaker Seminar from <a href="https://blackstarprojects.org/seminar/2026-seminar" target="_blank" title="Opens in a new window">BlackStar</a>!</p>',
                            'icon': 'theatre'
                        },
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [-122.168391, 37.42771137]
                        }
                    },
                    {
                        'type': 'Feature',
                        'properties': {
                            'description':
                                '<strong>Black Community Services Center (BCSC)</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.6egsb7s3kv1n" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p>',
                                'icon': 'theatre'
                        },
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [-122.1715322, 37.42488005]
                        }
                    },
                    {
                        'type': 'Feature',
                        'properties': {
                            'description':
                                '<strong>Cubberley Auditorium</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.fh98sp8dgj8" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p>',
                                'icon': 'art-gallery'
                        },
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [-122.1687652, 37.42659951]
                        }
                    },
                    {
                        'type': 'Feature',
                        'properties': {
                            'description':
                                '<strong>Dinkelspiel Auditorium</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.vqfi2vii0j4u" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p>',
                            'icon': 'bicycle'
                        },
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [-122.1702929, 37.4235705]
                        }
                    },
                    {
                        'type': 'Feature',
                        'properties': {
                            'description':
                                '<strong>Encina Hall</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.k0lmqpqc95e4" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p>',
                            'icon': 'rocket'
                        },
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [-122.1646098, 37.42786044]
                        }
                    },
                    {
                        'type': 'Feature',
                        'properties': {
                            'description':
                                '<strong>Eucalyptus Grove, Stanford University</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.9eykchjx0qhk" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p>',
                                'icon': 'music'
                        },
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [-122.1662297, 37.43399824]
                        }
                    },
                    {
                        'type': 'Feature',
                        'properties': {
                            'description':
                                '<strong>Harmony House</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.kitll7ta69sv" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p>',
                            'icon': 'music'
                        },
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [-122.1728736, 37.42568454]
                        }
                    },
                    {
                        'type': 'Feature',
                        'properties': {
                            'description':
                                '<strong>Memorial Auditorium</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.k8ko5pl97sta" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p>',
                            'icon': 'music'
                        },
                        'geometry': {
                            'type': 'Point',
                            'coordinates': [-122.1666437, 37.42852789]
                        },
                        {
                            'type': 'Feature',
                            'properties': {
                                'description':
                                    '<strong>Kresge Auditorium</strong><p>See <a href="https://sites.google.com/stanford.edu/ida-cbpa-archives/records-by-venue-categories?authuser=1#h.vwvrv3t638w" target="_blank" title="Opens in a new window">archival materials</a> that are connected to this space!<p>',
                                'icon': 'music'
                            },
                            'geometry': {
                                'type': 'Point',
                                'coordinates': [-122.168094, 37.42317953]
                        }
                    },  
                    }
                ]
            }
        });
        // Add a layer showing the places.
        map.addLayer({
            'id': 'places',
            'type': 'symbol',
            'source': 'places',
            'layout': {
                'icon-image': 'custom-marker',
                'icon-overlap': 'always'
            }
        });

        // When a click event occurs on a feature in the places layer, open a popup at the
        // location of the feature, with description HTML from its properties.
        map.on('click', 'places', (e) => {
            const coordinates = e.features[0].geometry.coordinates.slice();
            const description = e.features[0].properties.description;

            // Ensure that if the map is zoomed out such that multiple
            // copies of the feature are visible, the popup appears
            // over the copy being pointed to.
            while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
                coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
            }

            new maplibregl.Popup()
                .setLngLat(coordinates)
                .setHTML(description)
                .addTo(map);
        });

        // Change the cursor to a pointer when the mouse is over the places layer.
        map.on('mouseenter', 'places', () => {
            map.getCanvas().style.cursor = 'pointer';
        });

        // Change it back to a pointer when it leaves.
        map.on('mouseleave', 'places', () => {
            map.getCanvas().style.cursor = '';
        });
    });
</script>
</body>
</html>
